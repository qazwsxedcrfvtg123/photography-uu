events {
    worker_connections 1024;
}

http {
    client_body_temp_path C:/nginx/temp/client_body_temp;
    proxy_temp_path C:/nginx/temp/proxy_temp;
    fastcgi_temp_path C:/nginx/temp/fastcgi_temp;
    uwsgi_temp_path C:/nginx/temp/uwsgi_temp;
    scgi_temp_path C:/nginx/temp/scgi_temp;
    # 定義後端服務池（負載均衡）
    upstream backend_pool {
        # 輪詢（預設）- 本地開發用
        server 127.0.0.1:8888;
    }

    server {
        listen       80;
        server_name  localhost;

        # Serve static frontend files
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            # Fixed routing for React SPA (history mode)
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to backend with load balancing
        location /photography-uu/api/ { 
            rewrite ^/photography-uu/api/(.*)$ /api/$1 break;
            proxy_pass http://backend_pool;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}

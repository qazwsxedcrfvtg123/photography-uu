# 定義後端服務池（負載均衡）
upstream backend_pool {
    # 輪詢（預設）- 本地開發用
    server 127.0.0.1:8080;
    server 127.0.0.1:8081;
    server 127.0.0.1:8082;
    
    # 如果想要加權負載均衡，可以加 weight
    # server backend_host1:8080 weight=5;
    # server backend_host2:8080 weight=3;
    
    # 如果想要 IP Hash（同一用戶總是路由到同一伺服器）
    # ip_hash;
    
    # 健康檢查（商業版 Nginx Plus 才有）
    # keepalive 32;
}

server {
    listen       80;
    server_name  localhost;

    # Serve static frontend files
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Fixed routing for React SPA (history mode)
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend with load balancing
    location /api/ {
        proxy_pass http://backend_pool/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
